upstream streamverse_client {
    server 127.0.0.1:8032;
}

upstream streamverse_admin {
    server 127.0.0.1:8033;
}

server {
    listen 80;
    server_name projectgp.online www.projectgp.online;

    # Si tu landing sigue viva como app/PM2 en 8022, reemplaza el bloque root por:
    # location / {
    #     proxy_pass http://127.0.0.1:8022;
    #     include /etc/nginx/snippets/streamverse-proxy-headers.conf;
    # }
    root /mnt/ssd1/proyectos/projectGP/out;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name app.projectgp.online;

    client_max_body_size 256m;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location ^~ /cuenta/panel-admin/ { return 404; }
    location ^~ /panel-admin/ { return 404; }
    location ^~ /django-admin/ { return 404; }
    location ^~ /api/video/ { return 404; }

    location /static/ {
        alias /mnt/ssd1/proyectos/streamverse/staticfiles/;
        access_log off;
        expires 30d;
    }

    location /media/ {
        proxy_pass http://streamverse_client;
        include /etc/nginx/snippets/streamverse-proxy-headers.conf;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://streamverse_client;
        include /etc/nginx/snippets/streamverse-proxy-headers.conf;
    }
}

server {
    listen 80;
    server_name admin.projectgp.online;

    client_max_body_size 8g;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Opcional: solo LAN + Tailscale. Ajusta el rango 100.64.0.0/10 si usas Tailscale.
    # allow 192.168.0.0/16;
    # allow 100.64.0.0/10;
    # deny all;

    location /static/ {
        alias /mnt/ssd1/proyectos/streamverse/staticfiles/;
        access_log off;
        expires 30d;
    }

    location /media/ {
        proxy_pass http://streamverse_admin;
        include /etc/nginx/snippets/streamverse-proxy-headers.conf;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://streamverse_admin;
        include /etc/nginx/snippets/streamverse-proxy-headers.conf;
    }
}
