{% extends "base.html" %}
{% block title %}Eliminar genero | StreamVerse{% endblock %}
{% block content %}
<section class="auth-wrap glass">
  <h1>Eliminar genero</h1>
  <p>Vas a eliminar: <strong>{{ genre.name }}</strong></p>
  <form method="post" class="hero-actions">
    {% csrf_token %}
    <button type="submit" class="btn-primary">Si, eliminar</button>
    <a href="{% url 'admin_genres' %}" class="btn-ghost">Cancelar</a>
  </form>
</section>
{% endblock %}
