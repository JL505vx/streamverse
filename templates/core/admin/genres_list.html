{% extends "base.html" %}
{% block title %}Admin Generos | StreamVerse{% endblock %}
{% block content %}
<section class="dash-header glass admin-head">
  <h1>Gestion de generos</h1>
  <a class="btn-primary" href="{% url 'admin_genre_create' %}">Nuevo genero</a>
</section>

<div class="table-wrap glass">
  <table class="admin-table">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      {% for genre in genres %}
      <tr>
        <td>{{ genre.name }}</td>
        <td class="actions">
          <a class="btn-ghost" href="{% url 'admin_genre_edit' genre.pk %}">Editar</a>
          <a class="btn-mini" href="{% url 'admin_genre_delete' genre.pk %}">Eliminar</a>
        </td>
      </tr>
      {% empty %}
      <tr><td colspan="2" class="muted">No hay generos registrados.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
